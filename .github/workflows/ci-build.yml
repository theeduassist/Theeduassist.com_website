name: CI — Build site

# Add these Secrets in your repository: Settings → Secrets and variables → Actions
# - PUBLIC_SANITY_PROJECT_ID (e.g. jg4gi6mn)
# - PUBLIC_SANITY_DATASET (e.g. production)
# - PUBLIC_SANITY_API_VERSION (optional, e.g. 2026-06-01)
# - SANITY_VIEWER_TOKEN (optional, only if you need to read drafts/previews during build)

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SANITY_PROJECT_ID: ${{ secrets.PUBLIC_SANITY_PROJECT_ID }}
      PUBLIC_SANITY_DATASET: ${{ secrets.PUBLIC_SANITY_DATASET }}
      PUBLIC_SANITY_API_VERSION: ${{ secrets.PUBLIC_SANITY_API_VERSION }}
      SANITY_VIEWER_TOKEN: ${{ secrets.SANITY_VIEWER_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build Astro site
        run: pnpm --prefix "Theeduassist.com_website" build

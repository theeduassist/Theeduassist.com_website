<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
    <defs>
        <path id="text-arc-top" d="M 100 250 A 150 150 0 0 1 400 250" fill="transparent" />
        <path id="text-arc-bottom" d="M 420 250 A 170 170 0 0 1 80 250" fill="transparent" />
    </defs>
    <!-- Outer green ring -->
    <circle cx="250" cy="250" r="240" fill="#77BA55" stroke="#FFFFFF" stroke-width="4" />
    <!-- Inner blue circle -->
    <circle cx="250" cy="250" r="180" fill="#27496D" stroke="#FFFFFF" stroke-width="4" />

    <!-- Top Text -->
    <text fill="#FFFFFF" font-family="Arial, sans-serif" font-size="40" font-weight="bold" letter-spacing="2">
        <textPath href="#text-arc-top" startOffset="50%" text-anchor="middle">THEEDUASSIST</textPath>
    </text>
    <!-- Bottom Text -->
    <text fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24" font-weight="bold" letter-spacing="1">
        <textPath href="#text-arc-bottom" startOffset="50%" text-anchor="middle">E-LEARNING DESIGN AGENCY</textPath>
    </text>

    <!-- Two stars -->
    <path d="M 50 250 L 60 270 L 80 275 L 65 290 L 70 310 L 50 300 L 30 310 L 35 290 L 20 275 L 40 270 Z" fill="#FFFFFF" />
    <path d="M 450 250 L 460 270 L 480 275 L 465 290 L 470 310 L 450 300 L 430 310 L 435 290 L 420 275 L 440 270 Z" fill="#FFFFFF" />

    <!-- Open Book -->
    <path d="M 210 380 Q 230 370 250 380 Q 270 370 290 380 L 290 400 Q 270 390 250 400 Q 230 390 210 400 Z" fill="#FFFFFF" />

    <!-- Desktop monitor -->
    <rect x="190" y="290" width="120" height="80" rx="5" ry="5" fill="none" stroke="#FFFFFF" stroke-width="4" />
    <rect x="195" y="295" width="110" height="70" fill="none" stroke="#FFFFFF" stroke-width="2" />
    <path d="M 220 370 L 280 370" stroke="#FFFFFF" stroke-width="4" />

    <!-- Graduation cap inside monitor -->
    <path d="M 210 330 L 250 315 L 290 330 L 250 345 Z" fill="#FFFFFF" />
    <path d="M 225 335 L 225 355 L 250 365 L 275 355 L 275 335" fill="none" stroke="#FFFFFF" stroke-width="2" />

    <!-- Wi-Fi icon above monitor -->
    <path d="M 230 270 Q 250 260 270 270" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
    <path d="M 220 260 Q 250 245 280 260" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
    <circle cx="250" cy="280" r="4" fill="#FFFFFF" />

    <!-- Dotted vertical line up to circular node -->
    <line x1="250" y1="240" x2="250" y2="150" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="4,4" />
    <circle cx="250" cy="150" r="10" fill="#FFFFFF" />

    <!-- Circuit nodes in upper blue area -->
    <line x1="250" y1="150" x2="200" y2="120" stroke="#FFFFFF" stroke-width="2" />
    <circle cx="200" cy="120" r="6" fill="#FFFFFF" />
    <line x1="250" y1="150" x2="300" y2="120" stroke="#FFFFFF" stroke-width="2" />
    <circle cx="300" cy="120" r="6" fill="#FFFFFF" />

</svg>